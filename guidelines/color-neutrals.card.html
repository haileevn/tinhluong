<!-- @dsCard group="Colors" viewport="700x170" name="Neutral scale" subtitle="Warm slate — paper-like whites, grounded darks" -->
<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family:var(--font-sans); background:var(--surface-card); padding:var(--space-6); color:var(--text-body); }
  .ramp { display:flex; border-radius:var(--radius-md); overflow:hidden; box-shadow:var(--shadow-sm); border:1px solid var(--border-subtle); }
  .ramp > div { flex:1; height:64px; }
  .label { font-size:var(--text-2xs); color:var(--text-subtle); margin-top:var(--space-2); display:flex; font-family:var(--font-mono); }
  .label > span { flex:1; }
  .title { font-weight:var(--weight-bold); font-size:var(--text-sm); color:var(--text-strong); margin-bottom:var(--space-3); }
</style>
</head>
<body>
  <div class="title">Warm neutrals · <span style="font-family:var(--font-mono);font-weight:400;color:var(--text-muted)">--neutral-0 → 950</span></div>
  <div class="ramp">
    <div style="background:var(--neutral-0)"></div>
    <div style="background:var(--neutral-50)"></div>
    <div style="background:var(--neutral-100)"></div>
    <div style="background:var(--neutral-200)"></div>
    <div style="background:var(--neutral-300)"></div>
    <div style="background:var(--neutral-400)"></div>
    <div style="background:var(--neutral-500)"></div>
    <div style="background:var(--neutral-600)"></div>
    <div style="background:var(--neutral-700)"></div>
    <div style="background:var(--neutral-800)"></div>
    <div style="background:var(--neutral-900)"></div>
    <div style="background:var(--neutral-950)"></div>
  </div>
  <div class="label"><span>0</span><span>50</span><span>100</span><span>200</span><span>300</span><span>400</span><span>500</span><span>600</span><span>700</span><span>800</span><span>900</span><span>950</span></div>
