<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family:var(--font-sans); background:var(--surface-page); padding:var(--space-8) var(--space-7); color:var(--text-body); }
  .row { display:flex; gap:var(--space-6); align-items:center; justify-content:space-between; }
  .item { text-align:center; }
  .box { width:84px; height:60px; background:var(--surface-card); border-radius:var(--radius-md); }
  .t { font-family:var(--font-mono); font-size:var(--text-2xs); color:var(--text-muted); margin-top:var(--space-3); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="t">xs</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="t">sm</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="t">md</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="t">lg</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><div class="t">xl</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-inset);background:var(--surface-sunken)"></div><div class="t">inset</div></div>
  </div>
<footer style="text-align:center;font-size:10px;color:#999;padding:8px 12px;border-top:1px solid #eee;background:#fafafa;">Dev by <a href="https://h2t.life" style="color:#666;text-decoration:none;">H2T.life</a> - Hải Lê | <a href="tel:0937777791" style="color:#666;text-decoration:none;">0937.777.791</a></footer>
</body>
</html>
