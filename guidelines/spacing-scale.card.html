<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family:var(--font-sans); background:var(--surface-card); padding:var(--space-6) var(--space-7); color:var(--text-body); }
  .row { display:flex; align-items:flex-end; gap:var(--space-4); }
  .item { text-align:center; }
  .bar { background:var(--brand-subtle); border:1px solid var(--green-200); border-radius:var(--radius-xs); }
  .t { font-family:var(--font-mono); font-size:var(--text-2xs); color:var(--text-muted); margin-top:var(--space-2); }
  .v { font-size:var(--text-2xs); color:var(--text-subtle); }
  .bar.b { background:var(--brand); border-color:var(--brand); }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="bar" style="width:4px;height:4px"></div><div class="t">1</div><div class="v">4</div></div>
    <div class="item"><div class="bar" style="width:8px;height:8px"></div><div class="t">2</div><div class="v">8</div></div>
    <div class="item"><div class="bar" style="width:12px;height:12px"></div><div class="t">3</div><div class="v">12</div></div>
    <div class="item"><div class="bar" style="width:16px;height:16px"></div><div class="t">4</div><div class="v">16</div></div>
    <div class="item"><div class="bar" style="width:24px;height:24px"></div><div class="t">6</div><div class="v">24</div></div>
    <div class="item"><div class="bar b" style="width:32px;height:32px"></div><div class="t">8</div><div class="v">32</div></div>
    <div class="item"><div class="bar b" style="width:48px;height:48px"></div><div class="t">12</div><div class="v">48</div></div>
    <div class="item"><div class="bar b" style="width:64px;height:64px"></div><div class="t">16</div><div class="v">64</div></div>
  </div>
