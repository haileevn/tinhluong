<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family:var(--font-sans); background:var(--surface-card); padding:0; color:var(--text-body); }
  .wrap { display:grid; grid-template-columns:1fr 1fr; height:220px; }
  .panel { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:var(--space-3); }
  .dark { background:var(--green-900); }
  .lockup { display:flex; align-items:center; gap:var(--space-3); }
  .lockup img { width:48px; height:48px; }
  .word { font-family:var(--font-display); font-size:42px; font-weight:var(--weight-extra); letter-spacing:-0.02em; }
  .word .dot { color:var(--accent); }
  .tag { font-size:var(--text-xs); color:var(--text-muted); letter-spacing:var(--tracking-wide); }
  .tag.on-dark { color:var(--green-200); }
  .word.light { color:var(--text-strong); }
  .word.ondark { color:var(--neutral-50); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <div class="lockup">
        <img src="../assets/lua-mark.svg" alt="Lúa">
        <span class="word light">Lúa<span class="dot">.</span></span>
      </div>
      <div class="tag">Trả lương đúng, ứng lương dễ</div>
    </div>
    <div class="panel dark">
      <div class="lockup">
        <img src="../assets/lua-mark.svg" alt="Lúa">
        <span class="word ondark">Lúa<span class="dot">.</span></span>
      </div>
      <div class="tag on-dark">Trả lương đúng, ứng lương dễ</div>
    </div>
  </div>
<footer style="text-align:center;font-size:10px;color:#999;padding:8px 12px;border-top:1px solid #eee;background:#fafafa;">Dev by <a href="https://h2t.life" style="color:#666;text-decoration:none;">H2T.life</a> - Hải Lê | <a href="tel:0937777791" style="color:#666;text-decoration:none;">0937.777.791</a></footer>
</body>
</html>
