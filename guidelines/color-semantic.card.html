<!-- @dsCard group="Colors" viewport="700x200" name="Semantic & status" subtitle="Success / warning / danger / info + payroll lifecycle" -->
<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family:var(--font-sans); background:var(--surface-card); padding:var(--space-6); color:var(--text-body); }
  .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:var(--space-3); }
  .cell { border-radius:var(--radius-md); overflow:hidden; border:1px solid var(--border-subtle); }
  .sw { height:40px; }
  .cap { padding:var(--space-2) var(--space-2-5); }
  .n { font-weight:var(--weight-semibold); font-size:var(--text-xs); color:var(--text-strong); }
  .v { font-family:var(--font-mono); font-size:var(--text-2xs); color:var(--text-muted); }
  .sect { font-size:var(--text-2xs); letter-spacing:var(--tracking-caps); text-transform:uppercase; color:var(--text-subtle); margin:0 0 var(--space-2-5); font-weight:var(--weight-semibold); }
  .pills { display:flex; gap:var(--space-2); flex-wrap:wrap; margin-top:var(--space-4); }
  .pill { display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:var(--radius-pill); font-size:var(--text-xs); font-weight:var(--weight-semibold); }
  .dot { width:7px; height:7px; border-radius:50%; }
</style>
</head>
<body>
  <p class="sect">Semantic</p>
  <div class="grid">
    <div class="cell"><div class="sw" style="background:var(--success-500)"></div><div class="cap"><div class="n">Success</div><div class="v">--success-500</div></div></div>
    <div class="cell"><div class="sw" style="background:var(--warning-500)"></div><div class="cap"><div class="n">Warning</div><div class="v">--warning-500</div></div></div>
    <div class="cell"><div class="sw" style="background:var(--danger-500)"></div><div class="cap"><div class="n">Danger</div><div class="v">--danger-500</div></div></div>
    <div class="cell"><div class="sw" style="background:var(--info-500)"></div><div class="cap"><div class="n">Info</div><div class="v">--info-500</div></div></div>
  </div>
  <div class="pills">
    <span class="pill" style="background:var(--success-100);color:var(--status-paid)"><span class="dot" style="background:var(--status-paid)"></span>Đã trả</span>
    <span class="pill" style="background:var(--warning-100);color:var(--status-pending)"><span class="dot" style="background:var(--status-pending)"></span>Chờ duyệt</span>
    <span class="pill" style="background:var(--danger-100);color:var(--status-overdue)"><span class="dot" style="background:var(--status-overdue)"></span>Quá hạn</span>
    <span class="pill" style="background:var(--info-100);color:var(--status-approved)"><span class="dot" style="background:var(--status-approved)"></span>Đã duyệt</span>
    <span class="pill" style="background:var(--neutral-150);color:var(--status-draft)"><span class="dot" style="background:var(--status-draft)"></span>Nháp</span>
  </div>
</body>
</html>
